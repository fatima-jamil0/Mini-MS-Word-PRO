<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="style.css">
    <title>Document</title>
</head>
<body>

<div class="container">
<h1 id="heading">Mini MS Word💗</h1>

<div class="items">
<select id="size">
    <option value="8">8</option>
    <option value="9">9</option>
    <option value="10">10</option>
    <option value="11">11</option>
    <option value="12">12</option>
    <option value="14">14</option>
    <option value="16">16</option>
    <option value="18">18</option>
    <option value="20">20</option>
    <option value="22">22</option>
    <option value="24">24</option>
    <option value="26">26</option>
    <option value="28">28</option>
    <option value="36">36</option>
    <option value="48">48</option>
    <option value="72">72</option>
</select>
<button id="bold"><b>B</b></button>
<button id="italic"><i>I</i></button>
<button id="underline">U</button>
<button id="clear"><b>Clear</b></button>
<input type="color" id="color">
<select id="font">
    <option value="Pristina">Pristina</option>
    <option value="Arial">Arial</option>
    <option value="Georgia">Georgia</option>
    <option value="Brush Script MT">Brush Script MT</option>
    <option value="Segoe Script">Segoe Script</option>
    <option value="Freestyle Script">Freestyle Script</option>
    <option value="Jokerman">Jokerman</option>
    <option value="Copperplate Gothic Bold">Copperplate Gothic Bold</option>
    <option value="Edwardian Script ITC">Edwardian Script ITC</option>
    <option value="Blackadder ITC">Blackadder ITC</option>
    <option value="Ravie">Ravie</option>
    <option value="Segoe Print">Segoe Print</option>
    <option value="Freestyle Script">Freestyle Script</option>
    <option value="Gabriola">Gabriola</option>
    <option value="Vivaldi">Vivaldi</option>
    <option value="Viner Hand ITC">Viner Hand ITC</option>
    <option value="Tempus Sans ITC">Tempus Sans ITC</option>
</select>
<input type="color" id="bg">
<button id="left"><img src="./icons8-align-left-30.png" ></button>
<button id="center"><img src="./icons8-align-center-30.png" ></button>
<button id="right"><img src="./icons8-align-right-30.png" ></button>
<button id="justify"><img src="./icons8-align-justify-30.png" ></button>

</div>

  
<p id="para" contenteditable></p>


</div>

    <script src="app.js"></script>
</body>
</html>
